name: Task
description: Internal work — infra, refactor, chore, dependency bump, docs.
labels: ["type:task", "status:triaged"]
body:
  - type: textarea
    id: what
    attributes:
      label: What needs to happen?
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why
      description: The motivation. If this is part of a larger initiative, link the parent.
  - type: textarea
    id: done-when
    attributes:
      label: Done when
      description: A short checklist for completion.
