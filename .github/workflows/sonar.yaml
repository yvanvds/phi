name: SonarCloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  scan:
    name: SonarCloud scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout phi
        uses: actions/checkout@v4
        with:
          path: phi
          fetch-depth: 0

      - name: Checkout dart-yse (path dep sibling)
        uses: actions/checkout@v4
        with:
          repository: yvanvds/dart-yse
          path: dart-yse
          ref: main

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.3'
          channel: stable
          cache: true

      - name: Resolve dart-yse deps
        working-directory: dart-yse
        run: dart pub get

      - name: Resolve phi deps
        working-directory: phi
        run: flutter pub get

      - name: Test with coverage (for SonarCloud)
        working-directory: phi
        run: flutter test --coverage

      - name: SonarCloud scan
        uses: SonarSource/sonarcloud-github-action@v3
        with:
          projectBaseDir: phi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
