<!doctype html>
<html><head><meta charset="utf-8"><title>Type — Scale</title>

    <div style="display:flex; align-items:baseline; gap:14px;"><span class="value" style="width:60px;">11</span><span style="font-family:var(--font-mono); font-size:11px; letter-spacing:0.06em; text-transform:uppercase; color: var(--fg-2);">caption · labels</span></div>
