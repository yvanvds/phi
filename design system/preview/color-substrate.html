<!doctype html>
<html><head><meta charset="utf-8"><title>Color — Substrate</title>
<link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="label">substrate · the dark stack</div>

      <span class="label" style="color: var(--fg-1);">void</span>
      <span class="value">#06080a</span>
    </div>
    <div style="flex:1; background: var(--bg-0); padding: 18px 14px; height: 110px; display:flex; flex-direction:column; justify-content:space-between;">
      <span class="label">bg-0</span>
      <span class="value">#0a0d10</span>
    </div>
    <div style="flex:1; background: var(--bg-1); padding: 18px 14px; height: 110px; display:flex; flex-direction:column; justify-content:space-between;">
      <span class="label">bg-1</span>
      <span class="value">#10141a</span>
    </div>
    <div style="flex:1; background: var(--bg-2); padding: 18px 14px; height: 110px; display:flex; flex-direction:column; justify-content:space-between;">
      <span class="label">bg-2</span>
      <span class="value">#181d23</span>
    </div>
    <div style="flex:1; background: var(--bg-3); padding: 18px 14px; height: 110px; display:flex; flex-direction:column; justify-content:space-between;">
      <span class="label">bg-3</span>
      <span class="value">#21272e</span>
    </div>
    <div style="flex:1; background: var(--bg-4); padding: 18px 14px; height: 110px; display:flex; flex-direction:column; justify-content:space-between;">
      <span class="label">bg-4</span>
      <span class="value">#2b3138</span>
    </div>
  </div>
  <div class="value">never pure black. cool cast. each step ≈ +6% perceived lightness. hover = +1 step, press = +2.</div>
</div></body></html>
