<!doctype html>
<html><head><meta charset="utf-8"><title>Motion — Durations &amp; easings</title>
<link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="label">motion · fast attack, exponential decay · never bouncy</div>
  <style>
    @keyframes phi-attack {
      0% { transform: translateX(0); opacity: 0.2; box-shadow: none; }
      8% { transform: translateX(0); opacity: 1; box-shadow: 0 0 16px var(--voice-1-soft); }
      100% { transform: translateX(160px); opacity: 0.0; box-shadow: 0 0 0px var(--voice-1-soft); }
    }
    .pulse { animation: phi-attack 1.6s var(--ease-out) infinite; }
  </style>
  <div class="col" style="gap: 14px;">
    <div style="display:flex; align-items:center; gap:14px;">
      <span class="label" style="width:120px;">dur-1 · 90ms</span>
      <span class="value">state toggles, micro-flashes</span>
    </div>
    <div style="display:flex; align-items:center; gap:14px;">
      <span class="label" style="width:120px;">dur-2 · 160ms</span>
      <span class="value">menus, hover-rise</span>
    </div>
    <div style="display:flex; align-items:center; gap:14px;">
      <span class="label" style="width:120px;">dur-3 · 280ms</span>
      <span class="value">panel transitions</span>
    </div>
    <div style="display:flex; align-items:center; gap:14px;">
      <span class="label" style="width:120px;">dur-4 · 480ms</span>
      <span class="value">surface switch (max ui duration)</span>
    </div>
  </div>
  <div style="position: relative; height: 24px; background: var(--bg-1); border:1px solid var(--line-1); border-radius: 2px; overflow:hidden; margin-top: 8px;">
    <div class="pulse" style="position: absolute; top: 6px; left: 12px; width: 10px; height: 10px; background: var(--voice-1); border-radius: 50%;"></div>
  </div>
  <div class="value">ease-out · cubic-bezier(0.16, 1.0, 0.3, 1.0) — covers ~95% of ui motion.</div>
</div></body></html>
