<!doctype html>
<html><head><meta charset="utf-8"><title>Brand — Scope motif</title>
<link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="label">visual motif · scope traces</div>
  <div style="position: relative; height: 220px; background: var(--void); border:1px solid var(--line-1); border-radius: 4px; overflow: hidden;">
    <!-- grid -->
    <div style="position:absolute; inset:0; background-image:
      linear-gradient(to right, rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 32px 32px;"></div>
    <!-- traces -->
    <svg width="100%" height="100%" viewBox="0 0 660 220" preserveAspectRatio="none">
      <defs>
        <filter id="bloom" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="2.5"/>
        </filter>
      </defs>
      <g fill="none" stroke-width="1.4">
        <!-- voice 1 — drum, fast attack pulse -->
        <path d="M 0 110 L 60 110 L 80 60 L 100 110 L 200 110 L 220 50 L 240 110 L 340 110 L 360 70 L 380 110 L 480 110 L 500 50 L 520 110 L 660 110" stroke="#ff3dcb" filter="url(#bloom)" opacity="0.5"/>
        <path d="M 0 110 L 60 110 L 80 60 L 100 110 L 200 110 L 220 50 L 240 110 L 340 110 L 360 70 L 380 110 L 480 110 L 500 50 L 520 110 L 660 110" stroke="#ff3dcb" />
        <!-- voice 2 — pad, slow sine -->
        <path d="M 0 140 Q 80 100, 160 140 T 320 140 T 480 140 T 660 140" stroke="#6fd5ff" filter="url(#bloom)" opacity="0.4"/>
        <path d="M 0 140 Q 80 100, 160 140 T 320 140 T 480 140 T 660 140" stroke="#6fd5ff" stroke-width="1.1"/>
        <!-- voice 3 — sparks, jittery -->
        <path d="M 0 175 L 30 165 L 60 178 L 95 162 L 130 172 L 170 158 L 210 170 L 260 158 L 300 175 L 340 168 L 380 158 L 430 172 L 480 160 L 530 172 L 580 158 L 660 168" stroke="#ffb454" stroke-width="1" opacity="0.9"/>
      </g>
    </svg>
    <div style="position:absolute; left: 12px; top: 10px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-2);">scope · 3 voices · 16k window</div>
    <div style="position:absolute; right: 12px; top: 10px; font-family: var(--font-mono); font-size: 10px; color: var(--fg-3);">+0 dB</div>
  </div>
  <div class="value">the scope trace is phi's primary visual motif. emissive single-pass strokes over a dark grid, with a soft bloom layer underneath.</div>
</div></body></html>
