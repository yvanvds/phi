<!doctype html>
<html><head><meta charset="utf-8"><title>Color — Foreground</title>
<link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="label">foreground · text + grid steps</div>
  <div class="row" style="gap: 0; border:1px solid var(--line-1); border-radius: 6px; overflow:hidden;">
    <div style="flex:1; background: var(--bg-1); padding: 14px; height: 110px; display:flex; flex-direction:column; gap: 6px; justify-content:flex-end;">
      <div style="font-family:var(--font-display); font-weight:600; font-size:28px; line-height:1; color: var(--fg-0); letter-spacing:-0.02em;">Aa</div>
      <span class="label">fg-0 · primary</span>
      <span class="value">#f2f4f6</span>
    </div>
    <div style="flex:1; background: var(--bg-1); padding: 14px; height: 110px; display:flex; flex-direction:column; gap: 6px; justify-content:flex-end;">
      <div style="font-family:var(--font-display); font-weight:600; font-size:28px; line-height:1; color: var(--fg-1); letter-spacing:-0.02em;">Aa</div>
      <span class="label">fg-1 · secondary</span>
      <span class="value">#c1c7cd</span>
    </div>
    <div style="flex:1; background: var(--bg-1); padding: 14px; height: 110px; display:flex; flex-direction:column; gap: 6px; justify-content:flex-end;">
      <div style="font-family:var(--font-display); font-weight:600; font-size:28px; line-height:1; color: var(--fg-2); letter-spacing:-0.02em;">Aa</div>
      <span class="label">fg-2 · muted</span>
      <span class="value">#7a838d</span>
    </div>
    <div style="flex:1; background: var(--bg-1); padding: 14px; height: 110px; display:flex; flex-direction:column; gap: 6px; justify-content:flex-end;">
      <div style="font-family:var(--font-display); font-weight:600; font-size:28px; line-height:1; color: var(--fg-3); letter-spacing:-0.02em;">Aa</div>
      <span class="label">fg-3 · faint</span>
      <span class="value">#4a5159</span>
    </div>
    <div style="flex:1; background: var(--bg-1); padding: 14px; height: 110px; display:flex; flex-direction:column; gap: 6px; justify-content:flex-end;">
      <div style="font-family:var(--font-display); font-weight:600; font-size:28px; line-height:1; color: var(--fg-4); letter-spacing:-0.02em;">Aa</div>
      <span class="label">fg-4 · whisper</span>
      <span class="value">#2e343a</span>
    </div>
  </div>
  <div class="value">text never colored on hover. contrast already at target. fg-4 used for grid lines &amp; the lowest tier of structure.</div>
</div></body></html>
