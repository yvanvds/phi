<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing — Glow elevation</title>
<link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="label">elevation · glow is the language, not shadow</div>
  <div class="row" style="gap: 14px;">
    <div style="flex:1; background: var(--bg-1); border:1px solid var(--line-1); border-radius:4px; padding:14px; height:130px; display:flex; flex-direction:column; gap:8px; box-shadow: var(--elev-1);">
      <span class="label">elev-1 · resting</span>
      <span class="value" style="margin-top:auto;">panels at rest</span>
    </div>
    <div style="flex:1; background: var(--bg-2); border:1px solid var(--line-1); border-radius:4px; padding:14px; height:130px; display:flex; flex-direction:column; gap:8px; box-shadow: var(--elev-2);">
      <span class="label">elev-2 · hover</span>
      <span class="value" style="margin-top:auto;">menus, tooltips</span>
    </div>
    <div style="flex:1; background: var(--bg-2); border:1px solid var(--line-1); border-radius:6px; padding:14px; height:130px; display:flex; flex-direction:column; gap:8px; box-shadow: var(--elev-3);">
      <span class="label">elev-3 · floating</span>
      <span class="value" style="margin-top:auto;">command palette, dialogs</span>
    </div>
    <div style="flex:1; background: var(--bg-1); border:1px solid var(--line-hot); border-radius:4px; padding:14px; height:130px; display:flex; flex-direction:column; gap:8px; box-shadow: var(--glow-1);">
      <span class="label" style="color: var(--voice-1);">glow-1 · armed</span>
      <span class="value" style="margin-top:auto;">selected, live, transmitting</span>
    </div>
    <div style="flex:1; background: var(--bg-1); border:1px solid var(--line-hot); border-radius:4px; padding:14px; height:130px; display:flex; flex-direction:column; gap:8px; box-shadow: var(--glow-2);">
      <span class="label" style="color: var(--voice-1);">glow-2 · active</span>
      <span class="value" style="margin-top:auto;">primary cta, transition firing</span>
    </div>
  </div>
</div></body></html>
