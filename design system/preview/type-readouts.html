<!doctype html>
<html><head><meta charset="utf-8"><title>Type — Numeric readouts</title>
<link rel="stylesheet" href="_card.css"></head>
<body><div class="card gridded">
  <div class="label">readouts · jetbrains mono 500 · voice colored</div>
  <div class="row" style="gap: 32px; align-items: flex-end; padding: 8px 0;">
    <div class="col" style="gap: 2px;">
      <span class="label">tempo</span>
      <span style="font-family: var(--font-mono); font-weight: 500; font-size: 28px; color: var(--voice-1); text-shadow: 0 0 12px var(--voice-1-soft); letter-spacing: -0.01em;">118.4</span>
      <span class="value">bpm</span>
    </div>
    <div class="col" style="gap: 2px;">
      <span class="label">meter</span>
      <span style="font-family: var(--font-mono); font-weight: 500; font-size: 28px; color: var(--voice-2); text-shadow: 0 0 12px var(--voice-2-soft);">4 : 7</span>
      <span class="value">drum / pad</span>
    </div>
    <div class="col" style="gap: 2px;">
      <span class="label">peak</span>
      <span style="font-family: var(--font-mono); font-weight: 500; font-size: 28px; color: var(--voice-3); text-shadow: 0 0 12px var(--voice-3-soft);">−12.4</span>
      <span class="value">dBFS</span>
    </div>
    <div class="col" style="gap: 2px;">
      <span class="label">cohesion</span>
      <span style="font-family: var(--font-mono); font-weight: 500; font-size: 28px; color: var(--voice-5); text-shadow: 0 0 12px var(--voice-5-soft);">0.382</span>
      <span class="value">swarm A</span>
    </div>
  </div>
  <div class="value" style="margin-top: auto;">live numbers ALWAYS in mono — never proportional. unit kept small and dim.</div>
</div></body></html>
