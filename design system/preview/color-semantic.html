<!doctype html>
<html><head><meta charset="utf-8"><title>Color — Semantic</title>
<link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="label">semantic · status (fixed meaning, never reassigned)</div>
  <div class="row" style="gap: 10px;">
    <div style="flex:1; background: var(--bg-1); border:1px solid var(--line-1); border-radius:6px; padding:14px; display:flex; flex-direction:column; gap:10px;">
      <div style="display:flex; align-items:center; gap:8px;">
        <span style="display:inline-block; width:10px; height:10px; border-radius:50%; background: var(--live); box-shadow: 0 0 10px var(--voice-1-soft);"></span>
        <span style="font-family:var(--font-mono); font-size:11px; letter-spacing:0.06em; text-transform:uppercase; color: var(--live);">live</span>
      </div>
      <span class="value">#ff3dcb · transmitting</span>
    </div>
    <div style="flex:1; background: var(--bg-1); border:1px solid var(--line-1); border-radius:6px; padding:14px; display:flex; flex-direction:column; gap:10px;">
      <div style="display:flex; align-items:center; gap:8px;">
        <span style="display:inline-block; width:10px; height:10px; border-radius:50%; background: var(--cool); box-shadow: 0 0 10px var(--voice-2-soft);"></span>
        <span style="font-family:var(--font-mono); font-size:11px; letter-spacing:0.06em; text-transform:uppercase; color: var(--cool);">monitor</span>
      </div>
      <span class="value">#6fd5ff · info / preview</span>
    </div>
    <div style="flex:1; background: var(--bg-1); border:1px solid var(--line-1); border-radius:6px; padding:14px; display:flex; flex-direction:column; gap:10px;">
      <div style="display:flex; align-items:center; gap:8px;">
        <span style="display:inline-block; width:10px; height:10px; border-radius:50%; background: var(--warm); box-shadow: 0 0 10px var(--voice-3-soft);"></span>
        <span style="font-family:var(--font-mono); font-size:11px; letter-spacing:0.06em; text-transform:uppercase; color: var(--warm);">hold</span>
      </div>
      <span class="value">#ffb454 · attention / pending</span>
    </div>
    <div style="flex:1; background: var(--bg-1); border:1px solid var(--line-1); border-radius:6px; padding:14px; display:flex; flex-direction:column; gap:10px;">
      <div style="display:flex; align-items:center; gap:8px;">
        <span style="display:inline-block; width:10px; height:10px; border-radius:50%; background: var(--hot); box-shadow: 0 0 10px rgba(255,77,77,0.5);"></span>
        <span style="font-family:var(--font-mono); font-size:11px; letter-spacing:0.06em; text-transform:uppercase; color: var(--hot);">hot</span>
      </div>
      <span class="value">#ff4d4d · clip / error / kill</span>
    </div>
  </div>
  <div class="value">do not double as voices. these mean what they say regardless of assignment.</div>
</div></body></html>
