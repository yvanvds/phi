<!doctype html>
<html><head><meta charset="utf-8"><title>Brand — Particle / agent motif</title>
<link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="label">visual motif · agents &amp; swarms</div>
  <div style="position: relative; height: 220px; background: var(--void); border:1px solid var(--line-1); border-radius: 4px; overflow: hidden;">
    <!-- subtle dot grid -->
    <div style="position:absolute; inset:0; background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.04) 1px, transparent 0); background-size: 16px 16px;"></div>
    <!-- particles -->
    <svg width="100%" height="100%" viewBox="0 0 660 220" preserveAspectRatio="xMidYMid slice">
      <defs>
        <radialGradient id="p1"><stop offset="0%" stop-color="#ff3dcb" stop-opacity="1"/><stop offset="40%" stop-color="#ff3dcb" stop-opacity="0.6"/><stop offset="100%" stop-color="#ff3dcb" stop-opacity="0"/></radialGradient>
        <radialGradient id="p2"><stop offset="0%" stop-color="#6fd5ff" stop-opacity="1"/><stop offset="40%" stop-color="#6fd5ff" stop-opacity="0.6"/><stop offset="100%" stop-color="#6fd5ff" stop-opacity="0"/></radialGradient>
        <radialGradient id="p3"><stop offset="0%" stop-color="#ff5f9c" stop-opacity="1"/><stop offset="40%" stop-color="#ff5f9c" stop-opacity="0.6"/><stop offset="100%" stop-color="#ff5f9c" stop-opacity="0"/></radialGradient>
      </defs>
      <!-- swarm 1 -->
      <g>
        <circle cx="120" cy="80"  r="22" fill="url(#p1)" opacity="0.9"/>
        <circle cx="140" cy="100" r="14" fill="url(#p1)" opacity="0.7"/>
        <circle cx="100" cy="110" r="16" fill="url(#p1)" opacity="0.6"/>
        <circle cx="160" cy="70"  r="10" fill="url(#p1)" opacity="0.6"/>
        <circle cx="120" cy="80"  r="3"  fill="#eaffd6"/>
        <circle cx="140" cy="100" r="2"  fill="#eaffd6"/>
        <circle cx="100" cy="110" r="2"  fill="#eaffd6"/>
        <circle cx="160" cy="70"  r="1.5" fill="#eaffd6"/>
        <!-- vector -->
        <line x1="130" y1="90" x2="180" y2="60" stroke="#ff3dcb" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
      </g>
      <!-- swarm 2 -->
      <g>
        <circle cx="360" cy="120" r="20" fill="url(#p2)" opacity="0.9"/>
        <circle cx="390" cy="140" r="14" fill="url(#p2)" opacity="0.7"/>
        <circle cx="350" cy="150" r="12" fill="url(#p2)" opacity="0.7"/>
        <circle cx="380" cy="110" r="10" fill="url(#p2)" opacity="0.6"/>
        <circle cx="410" cy="125" r="9"  fill="url(#p2)" opacity="0.5"/>
        <circle cx="360" cy="120" r="3"  fill="#dff7ff"/>
        <circle cx="390" cy="140" r="2"  fill="#dff7ff"/>
        <circle cx="350" cy="150" r="2"  fill="#dff7ff"/>
        <circle cx="380" cy="110" r="1.5" fill="#dff7ff"/>
        <line x1="378" y1="130" x2="430" y2="100" stroke="#6fd5ff" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
      </g>
      <!-- lone agent -->
      <g>
        <circle cx="540" cy="80" r="16" fill="url(#p3)"/>
        <circle cx="540" cy="80" r="3" fill="#ffd0e1"/>
        <line x1="540" y1="80" x2="580" y2="115" stroke="#ff5f9c" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
      </g>
      <!-- attractor field -->
      <g opacity="0.5">
        <circle cx="260" cy="180" r="50" fill="none" stroke="rgba(255,255,255,0.16)" stroke-dasharray="2 4"/>
        <circle cx="260" cy="180" r="32" fill="none" stroke="rgba(255,255,255,0.10)" stroke-dasharray="2 4"/>
        <circle cx="260" cy="180" r="3" fill="#f2f4f6"/>
      </g>
    </svg>
    <div style="position:absolute; left: 12px; top: 10px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-2);">scene · 3 agents · 2 swarms · 1 attractor</div>
  </div>
  <div class="value">agents are glowing points with motion vectors. swarms cluster &amp; cohere. attractors draw with concentric dashed rings.</div>
</div></body></html>
