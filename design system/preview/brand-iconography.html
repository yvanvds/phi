<!doctype html>
<html><head><meta charset="utf-8"><title>Brand — Iconography</title>
<link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="label">iconography · lucide @ 1.5 stroke + 5 bespoke phi primitives</div>
  <style>
    .ico-cell { display:flex; flex-direction:column; align-items:center; gap: 6px; padding: 10px 6px; background: var(--bg-1); border:1px solid var(--line-1); border-radius: 4px; min-width: 60px; }
    .ico-cell .ico { color: var(--fg-1); }
    .ico-cell .lbl { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-2); }
  </style>
  <div class="row" style="gap: 8px; flex-wrap: wrap;">
    <!-- play -->
    <div class="ico-cell"><svg class="ico" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="6 3 20 12 6 21 6 3"/></svg><span class="lbl">play</span></div>
    <div class="ico-cell"><svg class="ico" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg><span class="lbl">pause</span></div>
    <div class="ico-cell"><svg class="ico" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="6"/></svg><span class="lbl">record</span></div>
    <div class="ico-cell"><svg class="ico" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 11 12 4 21 11"/><path d="M5 11v9h14v-9"/></svg><span class="lbl">scene</span></div>
    <div class="ico-cell"><svg class="ico" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><span class="lbl">patch</span></div>
    <div class="ico-cell"><svg class="ico" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M8 7l-5 5 5 5"/><path d="M16 7l5 5-5 5"/></svg><span class="lbl">code</span></div>
    <div class="ico-cell"><svg class="ico" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6" cy="6" r="3"/><circle cx="18" cy="18" r="3"/><line x1="8.5" y1="8.5" x2="15.5" y2="15.5"/></svg><span class="lbl">state</span></div>
    <div class="ico-cell"><svg class="ico" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M9 17V5l11-2v12"/><circle cx="6" cy="17" r="3"/><circle cx="17" cy="15" r="3"/></svg><span class="lbl">midi</span></div>
  </div>
  <!-- bespoke phi primitives -->
  <div class="row" style="gap: 8px; flex-wrap: wrap;">
    <div class="ico-cell" style="border-color: var(--line-hot); box-shadow: 0 0 12px var(--voice-1-soft);">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <circle cx="10" cy="14" r="2.5" fill="#ff3dcb"/>
        <line x1="10" y1="14" x2="18" y2="6" stroke="#ff3dcb" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      <span class="lbl" style="color: var(--voice-1);">agent</span>
    </div>
    <div class="ico-cell" style="border-color: var(--line-hot); box-shadow: 0 0 12px var(--voice-1-soft);">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <circle cx="8" cy="9" r="2" fill="#ff3dcb" opacity="0.9"/>
        <circle cx="14" cy="12" r="1.6" fill="#ff3dcb" opacity="0.8"/>
        <circle cx="10" cy="15" r="1.4" fill="#ff3dcb" opacity="0.7"/>
        <circle cx="16" cy="8" r="1.2" fill="#ff3dcb" opacity="0.7"/>
        <circle cx="12" cy="11" r="0.9" fill="#ff3dcb"/>
      </svg>
      <span class="lbl" style="color: var(--voice-1);">swarm</span>
    </div>
    <div class="ico-cell" style="border-color: var(--line-hot); box-shadow: 0 0 12px var(--voice-1-soft);">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#ff3dcb" stroke-width="1.4">
        <circle cx="12" cy="12" r="8"/>
        <line x1="12" y1="4" x2="12" y2="12"/>
        <line x1="12" y1="12" x2="18" y2="12" stroke-dasharray="2 2"/>
      </svg>
      <span class="lbl" style="color: var(--voice-1);">domain</span>
    </div>
    <div class="ico-cell" style="border-color: var(--line-hot); box-shadow: 0 0 12px var(--voice-1-soft);">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#ff3dcb" stroke-width="1.4">
        <rect x="5" y="5" width="14" height="14" rx="2"/>
        <circle cx="5" cy="5" r="1.4" fill="#ff3dcb"/>
        <circle cx="19" cy="5" r="1.4" fill="#ff3dcb"/>
        <circle cx="5" cy="19" r="1.4" fill="#ff3dcb"/>
        <circle cx="19" cy="19" r="1.4" fill="#ff3dcb"/>
      </svg>
      <span class="lbl" style="color: var(--voice-1);">state·node</span>
    </div>
    <div class="ico-cell" style="border-color: var(--line-hot); box-shadow: 0 0 12px var(--voice-1-soft);">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <rect x="5" y="5" width="14" height="14" fill="#ff3dcb"/>
      </svg>
      <span class="lbl" style="color: var(--voice-1);">voice</span>
    </div>
  </div>
  <div class="value">general-purpose: lucide CDN, 1.5px stroke. five bespoke primitives needed (agent / swarm / domain / state-node / voice-swatch) — final artwork TBD.</div>
</div></body></html>
