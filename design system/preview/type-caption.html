<!doctype html>
<html><head><meta charset="utf-8"><title>Type — Caption / labels</title>
<link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="label">caption · jetbrains mono 500 · uppercase · +0.04em</div>
  <div class="col" style="gap: 14px;">
    <div style="display: flex; gap: 28px; align-items: baseline;">
      <span style="font-family: var(--font-mono); font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-2);">domains</span>
      <span style="font-family: var(--font-mono); font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-2);">scene</span>
      <span style="font-family: var(--font-mono); font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-2);">code</span>
      <span style="font-family: var(--font-mono); font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-2);">state graph</span>
      <span style="font-family: var(--font-mono); font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-2);">midi</span>
    </div>
    <div style="height:1px; background: var(--line-1);"></div>
    <div style="display: flex; gap: 28px; align-items: baseline;">
      <span style="font-family: var(--font-mono); font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--voice-1); text-shadow: 0 0 8px var(--voice-1-soft);">live</span>
      <span style="font-family: var(--font-mono); font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-2);">armed</span>
      <span style="font-family: var(--font-mono); font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-3);">muted</span>
    </div>
  </div>
  <div class="value" style="margin-top: auto;">used for panel headers, fixed labels, status. set in mono so it reads as instrument chrome.</div>
</div></body></html>
