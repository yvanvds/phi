<!doctype html>
<html><head><meta charset="utf-8"><title>Brand — Wordmark</title>
<link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="label">wordmark · rubik glitch · lowercase</div>
  <div class="col" style="gap: 18px; padding: 10px 0;">
    <div style="font-family: var(--font-glitch); font-size: 96px; line-height: 1; color: var(--fg-0);">phi</div>
    <div style="height: 1px; background: var(--line-1);"></div>
    <div style="display:flex; align-items: baseline; gap: 30px;">
      <div style="font-family: var(--font-glitch); font-size: 56px; line-height: 1; color: var(--fg-0);">phi</div>
      <div style="font-family: var(--font-glitch); font-size: 32px; line-height: 1; color: var(--fg-0);">phi</div>
      <div style="font-family: var(--font-glitch); font-size: 20px; line-height: 1; color: var(--fg-0);">phi</div>
      <div style="font-family: var(--font-glitch); font-size: 14px; line-height: 1; color: var(--fg-0);">phi</div>
    </div>
  </div>
  <div class="value">always lowercase. the chromatic-shift glitch is part of the typeface itself — no CSS layering. minimum render size 12px (smaller and the glitch eats legibility).</div>
</div></body></html>
