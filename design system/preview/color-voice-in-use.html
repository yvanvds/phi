<!doctype html>
<html><head><meta charset="utf-8"><title>Color — Voice on dark (in use)</title>
<link rel="stylesheet" href="_card.css"></head>
<body><div class="card gridded">
  <div class="label">voices in context</div>
  <div class="row" style="gap: 0; border:1px solid var(--line-1); border-radius:6px; overflow:hidden; background: var(--bg-1);">
    <div style="flex:1; padding: 16px; display:flex; flex-direction:column; gap:10px; border-right: 1px solid var(--line-1);">
      <span class="label" style="color: var(--voice-1);">domain · drum</span>
      <div style="font-family:var(--font-mono); font-weight:500; font-size:22px; color: var(--voice-1); text-shadow: 0 0 12px var(--voice-1-soft);">124.0 bpm</div>
      <div style="height: 2px; background: var(--voice-1); box-shadow: 0 0 8px var(--voice-1-soft); opacity: 0.9; width: 62%;"></div>
    </div>
    <div style="flex:1; padding: 16px; display:flex; flex-direction:column; gap:10px; border-right: 1px solid var(--line-1);">
      <span class="label" style="color: var(--voice-2);">domain · pad</span>
      <div style="font-family:var(--font-mono); font-weight:500; font-size:22px; color: var(--voice-2); text-shadow: 0 0 12px var(--voice-2-soft);">7/8 cycle</div>
      <div style="height: 2px; background: var(--voice-2); box-shadow: 0 0 8px var(--voice-2-soft); opacity: 0.9; width: 28%;"></div>
    </div>
    <div style="flex:1; padding: 16px; display:flex; flex-direction:column; gap:10px; border-right: 1px solid var(--line-1);">
      <span class="label" style="color: var(--voice-3);">swarm · sparks</span>
      <div style="font-family:var(--font-mono); font-weight:500; font-size:22px; color: var(--voice-3); text-shadow: 0 0 12px var(--voice-3-soft);">0.6 coh</div>
      <div style="height: 2px; background: var(--voice-3); box-shadow: 0 0 8px var(--voice-3-soft); opacity: 0.9; width: 76%;"></div>
    </div>
    <div style="flex:1; padding: 16px; display:flex; flex-direction:column; gap:10px;">
      <span class="label" style="color: var(--voice-4);">state · break</span>
      <div style="font-family:var(--font-mono); font-weight:500; font-size:22px; color: var(--voice-4); text-shadow: 0 0 12px var(--voice-4-soft);">armed</div>
      <div style="height: 2px; background: var(--voice-4); box-shadow: 0 0 8px var(--voice-4-soft); opacity: 0.9; width: 12%;"></div>
    </div>
  </div>
  <div class="value">voice color is carried by text, indicator, and progress trace — never by panel background.</div>
</div></body></html>
