<!doctype html>
<html><head><meta charset="utf-8"><title>Brand — Logo mark</title>
<link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="label">logo mark · fuchsia</div>
  <div class="row" style="gap: 32px; align-items: center; padding: 14px 4px;">
    <div style="display:flex; align-items:center; justify-content:center; width: 140px; height: 140px; background: var(--void); border: 1px solid var(--line-1); border-radius: 4px;">
      <svg width="80" height="80" viewBox="0 0 64 64" fill="none">
        <defs><filter id="g" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="0.9"/></filter></defs>
        <g stroke="#ff3dcb" stroke-width="2.6" stroke-linecap="round" fill="none">
          <line x1="32" y1="4" x2="32" y2="60"/>
          <ellipse cx="32" cy="32" rx="14" ry="11"/>
        </g>
        <g stroke="#ff3dcb" stroke-width="2.6" fill="none" opacity="0.55" filter="url(#g)">
          <line x1="32" y1="4" x2="32" y2="60"/>
          <ellipse cx="32" cy="32" rx="14" ry="11"/>
        </g>
      </svg>
    </div>
    <div style="display:flex; align-items:center; justify-content:center; width: 60px; height: 60px; background: var(--bg-0); border: 1px solid var(--line-1); border-radius: 4px;">
      <svg width="30" height="30" viewBox="0 0 64 64" fill="none">
        <g stroke="#ff3dcb" stroke-width="4" stroke-linecap="round" fill="none">
          <line x1="32" y1="6" x2="32" y2="58"/>
          <ellipse cx="32" cy="32" rx="13" ry="10"/>
        </g>
      </svg>
    </div>
    <div style="display:flex; align-items:center; justify-content:center; width: 28px; height: 28px; background: var(--bg-0); border: 1px solid var(--line-1); border-radius: 3px;">
      <svg width="16" height="16" viewBox="0 0 64 64" fill="none">
        <g stroke="#ff3dcb" stroke-width="5.5" stroke-linecap="round" fill="none">
          <line x1="32" y1="6" x2="32" y2="58"/>
          <ellipse cx="32" cy="32" rx="12" ry="10"/>
        </g>
      </svg>
    </div>
    <div class="col" style="gap: 6px; max-width: 240px;">
      <span class="label">scope-trace φ</span>
      <span class="value">stroke weight scales with size. always emissive fuchsia (voice-1) when canonical. minimum 16px.</span>
    </div>
  </div>
</div></body></html>
