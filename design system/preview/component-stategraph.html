<!doctype html>
<html><head><meta charset="utf-8"><title>Components — State graph</title>
<link rel="stylesheet" href="_card.css"></head>
<body><div class="card gridded">
  <div class="label">state · the performance graph</div>
  <div style="position: relative; flex: 1; min-height: 220px;">
    <svg width="100%" height="220" style="position:absolute; inset: 0;" preserveAspectRatio="none" viewBox="0 0 660 220">
      <defs>
        <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#7a838d"/>
        </marker>
        <marker id="ah-hot" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff3dcb"/>
        </marker>
      </defs>
      <path d="M 130 70 L 250 70" stroke="#ff3dcb" stroke-width="1.4" fill="none" marker-end="url(#ah-hot)" filter="drop-shadow(0 0 6px rgba(255, 61, 203,0.5))"/>
      <path d="M 330 70 C 410 70, 410 150, 470 150" stroke="#7a838d" stroke-width="1.2" fill="none" marker-end="url(#ah)"/>
      <path d="M 330 90 C 410 90, 410 90, 470 70" stroke="#7a838d" stroke-width="1.2" fill="none" stroke-dasharray="3 3" marker-end="url(#ah)"/>
      <path d="M 250 95 C 250 130, 200 150, 200 150" stroke="#7a838d" stroke-width="1.2" fill="none" stroke-dasharray="3 3" marker-end="url(#ah)"/>
    </svg>

    <div style="position:absolute; left: 36px; top: 50px; padding: 10px 14px; background: var(--bg-1); border:1px solid var(--line-1); border-radius: 4px; min-width: 80px;">
      <div style="font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3);">state</div>
      <div style="font-family: var(--font-mono); font-size: 13px; color: var(--fg-1); margin-top: 2px;">intro</div>
    </div>

    <div style="position:absolute; left: 250px; top: 50px; padding: 10px 14px; background: var(--bg-1); border:1px solid var(--line-hot); border-radius: 4px; min-width: 80px; box-shadow: var(--glow-1);">
      <div style="font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--voice-1);">● live</div>
      <div style="font-family: var(--font-mono); font-size: 13px; color: var(--fg-0); margin-top: 2px;">verse</div>
    </div>

    <div style="position:absolute; left: 468px; top: 50px; padding: 10px 14px; background: var(--bg-1); border:1px solid rgba(255,180,84,0.5); border-radius: 4px; min-width: 80px; box-shadow: 0 0 16px var(--voice-3-soft);">
      <div style="font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--voice-3);">▲ armed · 4 bars</div>
      <div style="font-family: var(--font-mono); font-size: 13px; color: var(--fg-0); margin-top: 2px;">break</div>
    </div>

    <div style="position:absolute; left: 156px; top: 142px; padding: 8px 12px; background: var(--bg-1); border:1px solid var(--line-1); border-radius: 4px; min-width: 80px; opacity: 0.7;">
      <div style="font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3);">cond · audio &gt; −18</div>
      <div style="font-family: var(--font-mono); font-size: 13px; color: var(--fg-1); margin-top: 2px;">drone</div>
    </div>

    <div style="position:absolute; left: 432px; top: 142px; padding: 8px 12px; background: var(--bg-1); border:1px solid var(--line-1); border-radius: 4px; min-width: 80px; opacity: 0.7;">
      <div style="font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3);">terminal</div>
      <div style="font-family: var(--font-mono); font-size: 13px; color: var(--fg-1); margin-top: 2px;">out</div>
    </div>
  </div>
  <div class="value">solid arrow = traversed. dashed = available. hot = active. armed nodes pulse amber until fired.</div>
</div></body></html>
