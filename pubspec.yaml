name: phi
description: "Phi — flexible workstation for live electronic music performance"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.10.1
  flutter: ">=3.38.0"

dependencies:
  flutter:
    sdk: flutter
  yse:
    path: ../dart-yse
  google_fonts: ^6.2.1
  vector_math: ^2.1.4
  # Pinned to 0.9.0: it carries the merged Windows-build fix yet stays on
  # the Flutter >= 3.38 floor. 0.9.1 pulls image -> xml ^7.0.1, which needs
  # Dart 3.11 (Flutter 3.44+); revisit when the project raises that floor.
  macbear_3d: 0.9.0
  re_editor: ^0.9.0
  re_highlight: ^0.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Deterministic control of Timer.periodic in the MIDI player tests (#29).
  fake_async: ^1.3.1

flutter:
  uses-material-design: true
